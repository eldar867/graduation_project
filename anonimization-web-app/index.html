<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анонимизация ПДн | Загрузка</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <h1>🔒 Анонимизация персональных данных</h1>
        <nav><a href="index.html" class="active">Загрузка</a> <a href="preview.html">Настройка</a> <a href="export.html">Экспорт</a></nav>
    </header>

    <main class="container">
        <section class="upload-section">
            <h2>Загрузите датасет (CSV)</h2>
            <form id="uploadForm">
                <input type="file" id="csvFile" accept=".csv" required>
                <button type="submit">Анализировать файл</button>
            </form>
            <div id="status" class="status"></div>
            <table id="dataTable" class="data-table hidden">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <button id="nextBtn" class="btn-primary hidden" onclick="location.href='preview.html'">Перейти к настройке →</button>
        </section>
    </main>

    <footer class="app-footer">
        <p>УП.02 | Дипломный проект | Факультет ИСиТ</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
